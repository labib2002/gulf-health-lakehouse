version: 2

seeds:
  - name: dim_date
    description: Conformed date dimension (date spine covering the history range).
    config:
      column_types:
        date_key: integer
        date_day: date
        is_weekend: boolean
    columns:
      - name: date_key
        data_tests: [unique, not_null]
      - name: date_day
        data_tests: [unique, not_null]
