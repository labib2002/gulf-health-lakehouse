# Single-broker Kafka in KRaft mode (no ZooKeeper) for the streaming demo.
# Scope is producer/consumer + topic design — NOT cluster ops. Joins the shared
# health-net so the consumer can reach the data Postgres (ghl-postgres).
#
#   docker compose up -d postgres                                  # base
#   docker compose -f streaming/docker-compose.kafka.yml up -d     # kafka
name: ghl-kafka

services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ghl-kafka
    ports:
      - "9092:9092"     # host clients (producer/consumer run from host)
    environment:
      # --- KRaft: this single node is BOTH broker and controller ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      CLUSTER_ID: "ghl-kraft-cluster-0001"
      # --- listeners: internal (29092) for in-network, external (9092) for host ---
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      # single-node durability settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"   # we create topics deliberately
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks: [health-net]

networks:
  health-net:
    external: true
