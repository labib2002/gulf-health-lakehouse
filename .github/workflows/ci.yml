name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        # Generator, A/B math, and ingestion tests run hermetically. The Spark
        # tests skip automatically when Java/PySpark aren't present on the runner.
        run: pytest -q

  dbt-parse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-core==1.8.2" "dbt-postgres==1.8.2"

      - name: dbt deps + parse
        # parse compiles the whole project (models, tests, macros) without a DB.
        working-directory: transform/dbt
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/transform/dbt
          POSTGRES_HOST: localhost
        run: |
          dbt deps
          dbt parse
